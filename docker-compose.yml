version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - smartcampus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    depends_on:
      - backend
    networks:
      - smartcampus-network
    environment:
      - VITE_API_BASE_URL=http://backend:8080/api

networks:
  smartcampus-network:
    driver: bridge
